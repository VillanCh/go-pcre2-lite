name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (gofmt, vet)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Check gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "The following files are not gofmt-ed:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...

  test:
    name: Test ${{ matrix.os }} / Go ${{ matrix.go }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is arm64; ubuntu/windows-latest are amd64. The extra
        # include below adds Linux arm64 so all four target arch/OS pairs run.
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "stable"]
        include:
          - os: ubuntu-24.04-arm
            go: "stable"
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -count=1 ./...

  race:
    name: Race ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Test with -race
        run: go test -race -count=1 ./...

  bench-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      # Run every benchmark for a single iteration: this does not measure
      # performance (CI hardware is noisy) but guarantees the benchmarks still
      # compile and run without panicking.
      - name: Run benchmarks (1x smoke)
        run: go test -run '^$' -bench . -benchtime=1x ./...
